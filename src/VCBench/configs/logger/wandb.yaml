wandb:
  _target_: lightning.pytorch.loggers.WandbLogger
  project: VCBench
  save_dir: ${paths.output_dir}
  name: gears
  tags: ["hydra", "lightning", "VCBench"]

  # Key configuration: Completely disable environment scanning
  log_model: false
  # Real-time sync settings
  offline: false  # Ensure online mode for real-time sync
  settings:
    _disable_stats: true
    disable_git: true
    disable_code: true
    disable_job_creation: true
    # ⬇⬇⬇ Key line ⬇⬇⬇
    disable_python_packages: true
    # Real-time sync configuration
    save_code: false
    sync_tensorboard: true
    # Set sync interval to ensure real-time upload
    _sync_period: 10
    # Increase initialization timeout (default 90 seconds, increased to 300 seconds)
    init_timeout: 300
    # Use thread mode to start, avoid blocking
    _start_method: thread
    # Increase retry times and timeout settings
    _network_timeout: 60
    _console: off
    # Error tolerance: Allow API errors without interrupting training
    _disable_service: false
    # Set retry times
    _retry_timeout: 30