_target_: VCBench.modelcore.models.GEARS
data_path: ${paths.work_dir}
gene2go_path: data/gene2go.pkl
gene_set_path: data/essential_all_data_pert_genes.pkl
# pert_key: ${data.pert_key}
pert_key: ${data.pert_key}
comb_delim: ${data.perturbation_combination_delimiter}
control_val: ${data.control_val}
build_GO_workers: 100
seed: 42
# GEARS original paper parameters (recovered from comments)
hidden_size: 64  # Original: 64, Current: 384 (too large causes overfitting)
num_go_gnn_layers: 1
num_gene_gnn_layers: 1  # Original: 1, Current: 2 (too many layers)
decoder_hidden_size: 16  # Original: 16, Current: 48 (too large)
num_similar_genes_go_graph: 20  # Original: 20, Current: 25
num_similar_genes_co_express_graph: 20  # Original: 20, Current: 15
coexpress_threshold: 0.4  # Original: 0.4, Current: 0.31 (too low)
uncertainty: False
uncertainty_reg: 1
direction_lambda: 1e-1

use_cell_emb: false
use_mask: false  # Enable expression mask for weighted loss calculation
# use_covs is now auto-configured based on data.transform.use_covs
# use_covs: False

lr: 1e-3  # GEARS original learning rate
wd: 1e-6  # Reduce weight decay
lr_scheduler_freq: 1
lr_scheduler_interval: epoch
lr_scheduler_patience: 10
lr_scheduler_factor: 0.5
lr_monitor_key: val_loss
lr_scheduler_mode: onecycle  # Options: "onecycle", "plateau", or null/step (default: StepLR with step_size=1, gamma=0.5)
# lr_scheduler_max_lr: 0.001   # Max learning rate for OneCycleLR (only used when mode=onecycle)
# lr_scheduler_total_steps: auto-calculated from dataloader size * max_epochs