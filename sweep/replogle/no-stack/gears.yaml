project: VCBench
name: norman_hvg_0121_gears
method: grid

metric:
  goal: minimize
  name: val_loss_epoch


parameters:
  # Fixed settings
  data:
    value: gears
  data.train_num_workers:
    value: 0  # Set to 0 to avoid AF_UNIX path too long errors
  data.val_num_workers:
    value: 0
  data.test_num_workers:
    value: 0

  # data.task:
  #   value: srivatsantrapnell2020_sciplex3
  data.data_path:
    value: ./tasks_data/unseen_perts/ReplogleWeissman2022_K562_stack_hvg_split.h5ad
  # data.embedding_key:
  #   value: scgpt_embeddings  # if the dataset includes scGPT embeddings

  train:
    value: true
  test:
    value: true


  trainer.log_every_n_steps:
    value: 10
  trainer.max_epochs:
    value: 50
  trainer.min_epochs:
    value: 0
  trainer.devices:
    value: 1

 # data.transform.use_covs:
 #   value: false


  model.use_mask:
    value: false
  model.use_cell_emb:
    value: false
  model.data_path:
    value: ./tasks_data/gears_replogle

  data.train_batch_size:
    values: [32]

  # Sweep settings (note: model must be a single categorical value; do not turn it into a list)
  model:
    values: [gears]
    # values: [biolord, cpa, genepert, sclambda, squidiff, decoder_only, gears, latent_additive, linear_additive, prnet, sams_vae, state_sm]
  

  logger:
    value: wandb
  logger.wandb.project:
    value: VCBench
  # logger.wandb.name is auto-generated from model name, format: {model}_lr{lr}
  # model.dropout:
  #   distribution: uniform
  #   min: 0.0
  #   max: 0.3

  model.lr:
    values: [ 1e-3]
    # distribution: log_uniform_values
    # min: 1e-6
    # max: 1e-3

  # Learning rate scheduler parameters (unified across all models)
  model.lr_scheduler_mode:
    value: onecycle  # Use ReduceLROnPlateau for better convergence
  # model.lr_scheduler_patience:
  #   value: 10  # Wait 10 epochs before reducing LR when val_loss stops improving
  # model.lr_scheduler_factor:
  #   value: 0.5  # Reduce LR by factor of 0.5

  # model.lr_scheduler_max_lr:
  #   distribution: log_uniform_values
  #   min: 1e-4
  #   max: 1e-2

  model.wd:
    # values: [1e-8, 1e-7, 1e-6, 1e-5, 1e-4]
    values: [1e-7]

  # Early stopping parameters
  callbacks.early_stopping.monitor:
    values: ["val_loss_epoch"]
  callbacks.early_stopping.patience:
    values: [30]

# Key point: command only includes program; all hyperparameters are injected by wandb via ${args} (--key value)

program: src/VCBench/modelcore/train.py
command:
  - python
  - ${program}
  - ${args}
