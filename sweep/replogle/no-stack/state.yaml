project: VCBench
name: mcfarland_zeroshot_unseencell(state_sm)
method: grid

metric:
  goal: minimize
  name: val_loss_epoch

parameters:
  # Fixed settings
  data:
    value: mix_pert
  # data.task:
  #   value: srivatsantrapnell2020_sciplex3
  data.data_path:
    values: [tasks/unseen_perts/ReplogleWeissman2022_K562_stack_hvg_split.h5ad]

  train:
    value: true
  test:
    value: true

  trainer.log_every_n_steps:
    value: 10
  trainer.max_epochs:
    value: 50
  trainer.min_epochs:
    value: 0
  trainer.devices:
    value: 1

  data.val_batch_size:
    value: 64
  data.test_batch_size:
    value: 64
  data.train_num_workers:
    value: 0  # Set to 0 to avoid AF_UNIX path too long errors
  data.val_num_workers:
    value: 0
  data.test_num_workers:
    value: 0

  data.transform.gene_map_path:
    value: ESM2_pert_features.pt

  data.embedding_key:
    value: null
  data.cov_keys:
    value: [cell_line]
  data.result_avg_keys:
    value: [cell_line]
  data.sample_mode:
    value: set
  data.cell_set_len:
    value: 128

  data.train_batch_size:
    values: [8]

  model.use_mask:
    value: false
  model.use_cell_emb:
    value: false

  # Sweep settings (note: model must be a single categorical value; do not turn it into a list)
  model:
    values: [state_sm]
    # values: [biolord, cpa, genepert, sclambda, decoder_only, latent_additive, linear_additive, prnet, sams_vae]
  

  logger:
    value: wandb
  logger.wandb.project:
    value: VCBench

  model.lr:
    values: [1e-5]

  model.lr_scheduler_mode:
    value: onecycle  # Use ReduceLROnPlateau for better convergence


  model.wd:
    # values: [1e-8, 1e-7, 1e-6, 1e-5, 1e-4]
    values: [1e-7]

  # Early stopping parameters
  callbacks.early_stopping.monitor:
    values: ["val_loss_epoch"]
  callbacks.early_stopping.patience:
    values: [50]

program: src/VCBench/modelcore/train.py
command:
  - python
  - ${program}
  - ${args}